name: CI/CD - Lint Build Scan Push Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/final-tier2-app
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  ci:
    name: CI - Lint, Build, Scan, and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js with dependency cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Lint source code
        working-directory: app
        run: npm run lint

      - name: Build application artifact
        working-directory: app
        run: npm run build

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image with version tags
        run: |
          docker build \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -t $IMAGE_NAME:main-${{ github.run_number }} \
            .

      - name: Set up Trivy scanner
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          cache: true
          version: v0.69.3

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table
          skip-setup-trivy: true

      - name: Push Docker image to registry
        if: github.event_name == 'push'
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:main-${{ github.run_number }}

  cd:
    name: CD - Deploy to Production EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy production over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "Starting production deployment..."
            cd /opt/final-tier2

            echo "Logging in to Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "Updating APP_IMAGE in .env..."
            if grep -q "^APP_IMAGE=" .env; then
              sed -i "s|^APP_IMAGE=.*|APP_IMAGE=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|" .env
            else
              echo "APP_IMAGE=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> .env
            fi

            if grep -q "^APP_VERSION=" .env; then
              sed -i "s|^APP_VERSION=.*|APP_VERSION=${{ github.sha }}|" .env
            else
              echo "APP_VERSION=${{ github.sha }}" >> .env
            fi

            echo "Pulling new application image..."
            docker compose -f docker-compose.prod.yml pull app

            echo "Deploying production containers..."
            docker compose -f docker-compose.prod.yml up -d --scale app=2 --remove-orphans

            echo "Cleaning unused Docker images..."
            docker image prune -f

            echo "Current production status:"
            docker compose -f docker-compose.prod.yml ps

            echo "Testing production health endpoint..."
            sleep 10
            curl -f https://devops20.online/health

            echo "Deployment completed successfully."